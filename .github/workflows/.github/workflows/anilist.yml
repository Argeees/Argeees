name: AniList Metrics
on:
  # Se actualiza automáticamente cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutar el script manualmente desde la pestaña "Actions"
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Para AniList no se requiere token de GitHub
          token: NOT_NEEDED

          # Opciones de usuario y plantilla
          user: Argeees
          template: classic
          base: ""
          config_timezone: America/Mexico_City
          
          # Configuración de AniList
          plugin_anilist: yes
          plugin_anilist_user: Argeees
          plugin_anilist_limit_characters: 33
          plugin_anilist_sections: characters
          plugin_anilist_shuffle: yes
