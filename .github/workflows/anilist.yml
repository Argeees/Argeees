name: AniList Metrics
on:
  # Se actualiza automáticamente cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutar el script manualmente desde la pestaña "Actions"
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Usamos tu token guardado en los Secrets del repositorio
          token: ${{ secrets.METRICS_TOKEN }}

          # Opciones de usuario y plantilla
          user: Argeees
          template: classic
          base: ""
          config_timezone: America/Mexico_City
          
          # Configuración para que el archivo se guarde en tu repo
          output_action: commit
          
# Configuración de AniList
          plugin_anilist: yes
          plugin_anilist_user: Argeees
          # Incluimos ambos: animes y characters
          plugin_anilist_sections: favorites, characters 
          # Límites para mostrar exactamente 5 de cada uno
          plugin_anilist_limit: 5
          plugin_anilist_limit_characters: 5
          plugin_anilist_shuffle: yes
